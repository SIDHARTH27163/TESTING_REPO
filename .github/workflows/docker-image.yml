name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag my-app-test:latest
    -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ DOCKERUSER }}
          password: ${{ DOCKER_PASSWORD }}
    -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: sidharthguleria/mp-app-test:latest

